project:
  type: website
  pre-render:
    - scripts/apply-schedule.py
  resources:
    - "assets/**"

website:
  title: "SMF Teaching"
  description: "Teaching materials of the Institute of Strategic Management and Finance, Ulm University"
  site-url: https://papa-puma.github.io/smaf
  repo-url: https://github.com/papa-puma/smaf
  navbar:
    background: light
    # NOTE: using the Ulm University logo as a placeholder until a dedicated
    # SMF logo SVG is added at assets/logos/smf.svg.
    logo: assets/logos/uulm.svg
    logo-alt: "Ulm University"
    title: false
    left:
      - href: index.qmd
        text: Home
      - href: courses/research-in-finance/index.qmd
        text: "Research in Finance"
  page-footer:
    border: true
    left: |
      Institute of Strategic Management and Finance · Ulm University
    center: |
      Prof. Dr. Andre Guettler
    right: |
      Built with [Quarto](https://quarto.org)
  search:
    location: navbar
    type: overlay
  reader-mode: true

# Project-level default: HTML only.
# Lectures opt into revealjs + pdf + html (notes) via courses/.../lectures/_metadata.yml.
# Assignments opt into pdf in their own YAML headers.
format:
  html:
    theme:
      light: [cosmo, assets/styles/html.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    citations-hover: true
    footnotes-hover: true

# Default solutions OFF — student-facing builds strip solutions.
# Instructor renders with: quarto render <file> --metadata solutions:true
solutions: false

# Default author / affiliation cascade (overridable per course or lecture)
# author:
#   - name: "Institute of Strategic Management and Finance"
#     affiliation: "Ulm University"

execute:
  freeze: auto
