# Per-semester schedule for the Research in Finance course.
# This is the SINGLE source of truth for everything that changes per semester:
# semester string, exam id, deadlines, lecture dates and venues.
#
# The slides.qmd files are stable across semesters; do not edit them when
# rolling over to a new term. Only edit this file, then re-render and
# regenerate the Moodle setup checklist.
#
# Workflow:
#   1. Update the values below for the new semester.
#   2. Run `quarto render` (the pre-render hook applies the schedule).
#   3. Run `python scripts/generate-moodle-setup.py courses/research-in-finance`.
#   4. (Optional) tag the previous semester's final state in git, e.g.
#      `git tag -a winter-2025-26 -m "Final state, Winter 2025/2026"`.

