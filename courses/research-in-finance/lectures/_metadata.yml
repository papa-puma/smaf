# Shared bibliography — every lecture in this folder cites from references.bib.
# Quarto auto-renders the formatted list under any `## References` heading.
bibliography: ../../../../references.bib

format:
  revealjs:
    output-file: slides.html
    theme: [default, ../../../../_extensions/ulm-academic/theme.scss]
    logo: ../../../../assets/logos/uulm.svg
    footer: "SMF · Ulm University"
    slide-number: c/t
    progress: true
    chalkboard:
      buttons: false
    code-line-numbers: true
    highlight-style: github
    transition: fade
    background-transition: fade
    width: 1280
    height: 720
    incremental: false
    auto-stretch: true
    menu:
      side: left
      width: normal
  pdf:
    output-file: slides-handout.pdf
    documentclass: scrartcl
    geometry: margin=1in
    fontsize: 11pt
  html:
    output-file: notes.html
    # Hide the auto-rendered Authors / Affiliations meta block on the
    # long-form notes view — it duplicates info already on the course
    # homepage and the slide-deck title slide.
    include-in-header:
      text: |
        <style>
          .quarto-title-meta-author,
          .quarto-title-meta-author + .quarto-title-meta { margin-top: 0; }
          .quarto-title-meta-author { display: none !important; }
        </style>
  pptx:
    output-file: slides.pptx
    # Branded reference document (white bg, dark text, Cambria serif).
    # Generated by scripts/build-pptx-reference.py from Pandoc's default
    # template — Pandoc requires its own placeholder structure to write
    # slide content, so we layer brand customisation on top of that
    # rather than building from scratch.
    reference-doc: ../../../../assets/styles/pptx-reference.pptx
    slide-level: 2
