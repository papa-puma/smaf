meta:
  name: "SMF Ulm Teaching"
  link: https://www.uni-ulm.de/mawi/strategische-unternehmensfuehrung-und-finanzierung/

logo:
  # Using the Ulm University logo as a placeholder until a dedicated SMF
  # logo SVG is added at assets/logos/smf.svg.
  small: assets/logos/uulm.svg
  medium: assets/logos/uulm.svg
  large: assets/logos/uulm.svg

color:
  palette:
    ink:        "#111111"
    paper:      "#FFFFFF"
    gray-fg:    "#2a2a2a"
    gray-muted: "#6e6e6e"
    gray-rule:  "#d8d8d8"
    gray-bg:    "#f6f6f6"
    accent:     "#5b7a8c"   # subtle Ulm blue, used sparingly
  primary:    ink
  secondary:  gray-muted
  tertiary:   accent
  background: paper
  foreground: ink
  link:       ink

typography:
  # Computer Modern Serif (LaTeX standard) and Computer Modern Typewriter
  # are loaded via @import in assets/styles/html.scss and
  # _extensions/ulm-academic/theme.scss — Quarto's brand-yml only accepts
  # `google` as a font source, so we declare the family here for reference
  # but skip the `source:` field.
  base:
    family: "Computer Modern Serif"
    size: 1.05rem
    line-height: 1.65
  headings:
    family: "Computer Modern Serif"
    weight: 700
    color: ink
  monospace:
    family: "Computer Modern Typewriter"
    size: 0.95em
  link:
    color: ink
    decoration: underline
